{% extends 'base.html' %}
{% block content %}

<!-- Main Section Start -->
<div class="main-section">
    <div class="page-section nopadding cs-nomargin"
         style="margin-top: 0px;padding-top: 60px;padding-bottom: 60px;margin-bottom: 0px;">
        <div class="container">
            <div class="row">
                <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12 ">
                    <div class="user-dashboard loader-holder" style="width: 450px; min-height:auto;">
                        <div class="user-holder">
                            <h4 class="text-center" style="margin-bottom: 0;">
                                SIGN IN
                            </h4>
                            <p class="text-center">
                                Order food from your favourite restaurants.
                            </p>

                            <hr>

                            <div id="restaurant-sets-holder">
                                <form action="{% url 'login' %}"
                                      class="form-fields-set foodbakery-dev-restaurant-form"
                                      method="post">
                                {% csrf_token %}
                                    <ul class="register-add-restaurant-tab-container
                                    restaurant-information-tab-container">
                                        <li>
                                            <div class="row">
                                                <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
                                                    <div class="field-holder">
                                                        <label>Email Address</label>
                                                        <input type="email" name="email"
                                                               placeholder="Enter your email address">
                                                    </div>
                                                    <div class="field-holder mb-0">
                                                        <label>Password</label>
                                                        <input type="password" name="password"
                                                               placeholder="Enter your password">
                                                    </div>
                                                </div>
                                            </div>
                                        </li>
                                        <li>
                                            <div class="row">
                                                <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
                                                    <div class="field-holder mb-0">
                                                        <div class="payment-holder mb-0">
                                                            <input type="submit" value="LOGIN"
                                                                   id="btn-next-restaurant-information"
                                                                   class="bgcolor">
                                                        </div>
                                                    </div>

                                                    <hr>

                                                    <div class="field-holder mb-0">
                                                        <div class="payment-holder mb-0">
                                                            <a class="float-right" href="{% url 'forgot_password' %}"> Forgot Password?</a>
                                                        </div>
                                                    </div>

                                                </div>
                                            </div>

                                            <div class="row">
                                                <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
                                                    <!-- load message -->
                                                    {% include 'includes/alerts.html' %}
                                                </div>
                                            </div>
                                        </li>
                                    </ul>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Main Section End -->

{% endblock %}
